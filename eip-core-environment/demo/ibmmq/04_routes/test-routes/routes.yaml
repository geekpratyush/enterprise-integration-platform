# routes.yaml
# Optimized IBM MQ Routes with Transactional Reliability

- from:
    uri: "timer:test-trigger"
    parameters:
      repeatCount: 5
      period: 1
    steps:
      - setBody:
          constant: "Hello from EIP Platform Standard Route!"
      - to:
          uri: "kamelet:ibmmq-sink"
          parameters:
            queuename: "DEV.QUEUE.1"
      - log: ">>> [MQ-PRODUCER] SENT TO DEV.QUEUE.1: ${body}"

- from:
    uri: "kamelet:ibmmq-source"
    parameters:
      queuename: "DEV.QUEUE.1"
      # Enable Local Transactions for message durability
      transacted: true
      # Concurrent consumers for high throughput
      concurrentconsumers: 3
    steps:
      - log: ">>> [MQ-CONSUMER] RECEIVED FROM DEV.QUEUE.1: ${body}"
      - log: ">>> [MQ-CONSUMER] Processing complete. Transaction will commit."
