- route:
      id: "parse-mt-to-xml"
      from:
          uri: "platform-http:///fuel-engine/parse-mt"
          steps:
              # 1. Unmarshal text into the Prowide Object
              - unmarshal:
                    swiftMt: {}

              # 2. Call the .xml() method on the object to transform it
              - setBody:
                    simple: "${body.xml()}"

              # 3. Set the response header
              - setHeader:
                    name: "Content-Type"
                    constant: "application/xml"
