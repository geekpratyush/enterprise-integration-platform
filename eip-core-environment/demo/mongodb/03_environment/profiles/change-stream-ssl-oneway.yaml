EIP_MONGO_PORT: "27030"
EIP_MONGO_ROOT_USER: "eip_admin"
EIP_MONGO_ROOT_PASS: "eip_password"
EIP_MONGO_CMD_ARGS: "--auth --bind_ip_all --replSet rs0 --tlsMode requireTLS --tlsCertificateKeyFile /etc/mongodb/certs/mongodb.pem --tlsCAFile /etc/mongodb/certs/root.crt --tlsAllowConnectionsWithoutCertificates --keyFile /etc/mongodb/replica.key"
QUARKUS_TLS_MONGO_TRUST_STORE_PEM_CERTS: "~/.eip/certs/mongodb/change-stream-ssl-oneway/root.crt"
QUARKUS_MONGODB_MONGOCLIENT_TLS_CONFIGURATION_NAME: "mongo"
QUARKUS_MONGODB_CLIENT1_TLS_CONFIGURATION_NAME: "mongo" 
QUARKUS_MONGODB_MONGOCLIENT_CONNECTION_STRING: "mongodb://eip_admin:eip_password@127.0.0.1:27030/eip_db?authSource=admin&authMechanism=SCRAM-SHA-256&authMechanism=SCRAM-SHA-256&tls=true&tlsAllowInvalidHostnames=true&directConnection=true"
QUARKUS_MONGODB_CLIENT1_CONNECTION_STRING: "mongodb://eip_admin:eip_password@127.0.0.1:27030/eip_db?authSource=admin&authMechanism=SCRAM-SHA-256&authMechanism=SCRAM-SHA-256&tls=true&tlsAllowInvalidHostnames=true&directConnection=true" 
JAVA_OPTS: "-Djavax.net.ssl.trustStore=~/.eip/certs/mongodb/change-stream-ssl-oneway/truststore.p12 -Djavax.net.ssl.trustStorePassword=changeit -Djavax.net.ssl.trustStoreType=PKCS12"
QUARKUS_IBMMQ_ENABLED: "false"
QUARKUS_MONGODB_DEVSERVICES_ENABLED: "false"
QUARKUS_MONGODB_CONNECT_ON_STARTUP: "false"
QUARKUS_LOG_LEVEL: "INFO"
CAMEL_MAIN_DUMP_ROUTES: "true"
EIP_MONGODB_STREAMS_ENABLED: "true"
EIP_BOOTSTRAP_DISABLED: "true"
