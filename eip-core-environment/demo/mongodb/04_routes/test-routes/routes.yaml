# ==========================================
# 1. INSERT (Kamelet Sink)
# ==========================================
- route:
    id: "mongo-kamelet-insert"
    from:
      uri: "timer:trigger-insert?period=500&repeatCount=5"
      steps:
        - setBody:
            constant: "{\"messageId\": \"EXP-KAM-001\", \"status\": \"NEW\", \"category\":
              \"FINANCE\"}"
        - to:
            uri: "kamelet:eip-mongodb-sink"
            parameters:
              connectionBean: "client1"
              database: "eip_db"
              collection: "operations"
              operation: "insert"
        - log: ">>> [KAMELET-INSERT] Success: ${body}"

# ==========================================
# 2. UPDATE (Kamelet Action)
# ==========================================
- route:
    id: "mongo-kamelet-update"
    from:
      uri: "timer:trigger-update?delay=500&period=500&repeatCount=1"
      steps:
        - setBody:
            constant: "[{\"messageId\": \"EXP-KAM-001\"}, {\"$set\": {\"status\":
              \"PROCESSED\"}}]"
        - to:
            uri: "kamelet:eip-mongodb-action"
            parameters:
              connectionBean: "client1"
              database: "eip_db"
              collection: "operations"
              operation: "update"
        - log: ">>> [KAMELET-UPDATE] Success: ${body}"

# ==========================================
# 3. FIND ALL (Kamelet Action)
# ==========================================
- route:
    id: "mongo-kamelet-findall"
    from:
      uri: "timer:trigger-findall?delay=10000&period=60000&repeatCount=1"
      steps:
        - setBody:
            constant: "{}"
        - to:
            uri: "kamelet:eip-mongodb-action"
            parameters:
              connectionBean: "client1"
              database: "eip_db"
              collection: "operations"
              operation: "findAll"
        - log: ">>> [KAMELET-FIND-ALL] Count: ${body.size()}"

# ==========================================
# 4. FILTER QUERY (Kamelet Action)
# ==========================================
- route:
    id: "mongo-kamelet-filter"
    from:
      uri: "timer:trigger-filter?delay=15000&period=60000&repeatCount=1"
      steps:
        - setBody:
            constant: "{\"category\": \"FINANCE\"}"
        - to:
            uri: "kamelet:eip-mongodb-action"
            parameters:
              connectionBean: "client1"
              database: "eip_db"
              collection: "operations"
              operation: "findAll"
        - log: ">>> [KAMELET-FILTER] Found: ${body}"

