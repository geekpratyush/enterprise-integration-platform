# ==========================================
# 6. COMPLEX INSERT (Kamelet Sink)
# ==========================================
- route:
    id: "mongo-kamelet-insert-complex"
    from:
      uri: "timer:trigger-insert-complex?delay=20000&period=60000&repeatCount=1"
      steps:
        - setBody:
            constant: >
              {
                "IDENTIFIER": "COMPLEX-001",
                "NOTIFICATIONS": [
                  {"type": "email", "active": true},
                  {"type": "sms", "active": false}
                ],
                "ATTACHMENT": {
                  "$blob": "SGVsbG8sIEJMT0IhIFRoaXMgaXMgYmluYXJ5IGRhdGEu"
                }
              }
        - to:
            uri: "kamelet:eip-mongodb-sink"
            parameters:
              connectionBean: "client1"
              database: "eip_db"
              collection: "complex_data"
              operation: "insert"
        - log: ">>> [MONGO-COMPLEX-INSERT] Success: ${body}"

# ==========================================
# 7. COMPLEX FIND ALL (Kamelet Action)
# ==========================================
- route:
    id: "mongo-kamelet-findall-complex"
    from:
      uri: "timer:trigger-findall-complex?delay=30000&period=60000&repeatCount=1"
      steps:
        - setBody:
            constant: "{}"
        - to:
            uri: "kamelet:eip-mongodb-action"
            parameters:
              connectionBean: "client1"
              database: "eip_db"
              collection: "complex_data"
              operation: "findAll"
        - split:
            simple: "${body}"
            steps:
              - log: ">>> [MONGO-COMPLEX-FINDALL] Record: ${body}"
