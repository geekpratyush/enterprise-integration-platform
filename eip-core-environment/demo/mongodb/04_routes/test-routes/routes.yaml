- errorHandler:
    deadLetterChannel:
      deadLetterUri: "log:mongo-error-sink?showCaughtException=true&showStackTrace=true"
      redeliveryPolicy:
        maximumRedeliveries: 3
        redeliveryDelay: 5000

# ==========================================
# 1. INSERT (Kamelet Sink)
# ==========================================
- route:
    id: "mongo-kamelet-insert"
    from:
      uri: "timer:trigger-insert?period=500&repeatCount=5"
      steps:
        - setBody:
            constant: "{\"messageId\": \"EXP-KAM-001\", \"status\": \"NEW\", \"category\":
              \"FINANCE\"}"
        - to:
            uri: "kamelet:eip-mongodb-sink"
            parameters:
              connectionBean: "client1"
              database: "eip_db"
              collection: "operations"
              operation: "insert"
        - log: ">>> [KAMELET-INSERT] Success: ${body}"

# ==========================================
# 2. UPDATE (Kamelet Action)
# ==========================================
- route:
    id: "mongo-kamelet-update"
    from:
      uri: "timer:trigger-update?delay=500&period=500&repeatCount=1"
      steps:
        - setBody:
            constant: "{\"$set\": {\"status\": \"PROCESSED\"}}"
        - to:
            uri: "kamelet:eip-mongodb-action"
            parameters:
              connectionBean: "client1"
              database: "eip_db"
              collection: "operations"
              operation: "update"
              filter: "{\"messageId\": \"EXP-KAM-001\"}"
        - log: ">>> [KAMELET-UPDATE] Success: ${body}"

# ==========================================
# 3. FIND ALL (Kamelet Action)
# ==========================================
- route:
    id: "mongo-kamelet-findall"
    from:
      uri: "timer:trigger-findall?delay=10000&period=60000&repeatCount=1"
      steps:
        - setBody:
            constant: "{}"
        - to:
            uri: "kamelet:eip-mongodb-action"
            parameters:
              connectionBean: "client1"
              database: "eip_db"
              collection: "operations"
              operation: "findAll"
        - log: ">>> [KAMELET-FIND-ALL] Count: ${body.size()}"

# ==========================================
# 8. UPSERT EXAMPLE (Kamelet Sink)
# ==========================================
- route:
    id: "mongo-kamelet-upsert"
    from:
      uri: "timer:trigger-upsert?delay=35000&period=60000&repeatCount=1"
      steps:
        - setBody:
            constant: "{\"$set\": {\"status\": \"UPSERTED\", \"lastTouch\":
              \"${date:now:yyyy-MM-dd'T'HH:mm:ss}\"}}"
        - to:
            uri: "kamelet:eip-mongodb-sink"
            parameters:
              connectionBean: "client1"
              database: "eip_db"
              collection: "operations"
              operation: "update"
              upsert: true
              filter: "{\"messageId\": \"EXP-KAM-UPSERT\"}"
        - log: ">>> [MONGO-UPSERT] Successfully managed: ${body}"
