# ==========================================
# 1. INSERT (Kamelet Sink)
# ==========================================
- route:
    id: "mongo-kam-stream-insert"
    from:
      uri: "timer:trigger-insert?period=30000&repeatCount=1"
      steps:
        - setBody:
            constant: "{\"messageId\": \"STRM-001\", \"status\": \"NEW\", \"type\": \"CDC-TEST\"}"
        - to:
            uri: "kamelet:eip-mongodb-sink"
            parameters:
              connectionBean: "client1"
              database: "eip_db"
              collection: "operations"
              operation: "insert"
        - log: ">>> [SEED] Inserted record: ${body}"

# ==========================================
# 2. UPDATE (Kamelet Action)
# ==========================================
- route:
    id: "mongo-kam-stream-update"
    from:
      uri: "timer:trigger-update?delay=5000&period=60000&repeatCount=1"
      steps:
        - setBody:
            constant: "{\"$set\": {\"status\": \"MUTATED\"}}"
        - to:
            uri: "kamelet:eip-mongodb-action"
            parameters:
              connectionBean: "client1"
              database: "eip_db"
              collection: "operations"
              operation: "update"
              filter: "{\"messageId\": \"STRM-001\"}"
        - log: ">>> [SEED] Triggered update for record: STRM-001"

# ==========================================
# 2b. UPSERT (Kamelet Sink)
# ==========================================
- route:
    id: "mongo-kam-stream-upsert"
    from:
      uri: "timer:trigger-upsert?delay=10000&period=60000&repeatCount=1"
      steps:
        - setBody:
            constant: "{\"$set\": {\"status\": \"UPSERTED\", \"source\": \"timer\"}}"
        - to:
            uri: "kamelet:eip-mongodb-sink"
            parameters:
              connectionBean: "client1"
              database: "eip_db"
              collection: "operations"
              operation: "update"
              upsert: true
              filter: "{\"messageId\": \"STRM-UPSERT-01\"}"
        - log: ">>> [SEED] Triggered Upsert for record: STRM-UPSERT-01"

# ==========================================
# 3. CHANGE STREAM (Kamelet Source)
# ==========================================
- route:
    id: "mongo-kam-stream-observer"
    from:
      uri: "kamelet:eip-mongodb-source"
      parameters:
        connectionBean: "client1"
        database: "eip_db"
        collection: "operations"
        # Only capture 'update' operations where status becomes 'MUTATED'
        streamFilter: "{ $match: { 'operationType': 'update', 'updateDescription.updatedFields.status': 'MUTATED' } }"
      steps:
        - log: ">>> [OBSERVER] Mutation Captured! Event: ${body}"
