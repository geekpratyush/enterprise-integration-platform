# docker-sqlserver-secure.yaml - Industrialized SQL Server with mTLS Enforcement
services:
  sqlserver-platform:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-platform
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Password123!"
      MSSQL_PID: "Developer"
    volumes:
      # Mount the PKI certificates and the generated configuration
      - ../02_initialization/certs/${MODE}:/etc/ssl/sqlserver:ro
      - ../02_initialization/certs/${MODE}/mssql.conf:/var/opt/mssql/mssql.conf:ro
    networks:
      - eip-net

networks:
  eip-net:
    name: eip-network
