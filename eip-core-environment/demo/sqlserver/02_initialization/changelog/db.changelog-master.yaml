databaseChangeLog:
  - changeSet:
      id: 1-sqlserver-create-refined-tables
      author: pratyush
      changes:
        - createTable:
            tableName: BUSINESS_DATA
            columns:
              - column:
                  name: ID
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: TXN_ID
                  type: VARCHAR(50)
              - column:
                  name: STATUS
                  type: VARCHAR(20)
              - column:
                  name: PAYLOAD
                  type: NVARCHAR(MAX)
              - column:
                  name: CREATED_AT
                  type: DATETIME
                  defaultValueComputed: GETDATE()
        
        - createTable:
            tableName: AUDIT_EVENTS
            columns:
              - column:
                  name: AUDIT_ID
                  type: VARCHAR(50)
                  constraints:
                    primaryKey: true
              - column:
                  name: TIMESTAMP
                  type: VARCHAR(50)
              - column:
                  name: CORRELATION_ID
                  type: VARCHAR(50)
              - column:
                  name: ROUTE_ID
                  type: VARCHAR(50)
              - column:
                  name: IS_ENCRYPTED
                  type: BIT
              - column:
                  name: PAYLOAD
                  type: NVARCHAR(MAX)

        - createTable:
            tableName: COMPLEX_DATA
            columns:
              - column:
                  name: ID
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: IDENTIFIER
                  type: VARCHAR(50)
              - column:
                  name: NOTIFICATIONS
                  type: NVARCHAR(MAX)
              - column:
                  name: ATTACHMENT
                  type: VARBINARY(MAX)
