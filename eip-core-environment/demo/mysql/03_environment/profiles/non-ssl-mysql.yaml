# MYSQL NON-SSL PROFILE
QUARKUS_DATASOURCE_JDBC_URL: "jdbc:mysql://127.0.0.1:3306/eip_db"
QUARKUS_DATASOURCE_USERNAME: "eip_user"
QUARKUS_DATASOURCE_PASSWORD: "eip_password"
QUARKUS_DATASOURCE_DB_KIND: "mysql"

QUARKUS_LIQUIBASE_MIGRATE_AT_START: "true"
QUARKUS_LIQUIBASE_ENABLED: "true"
QUARKUS_LIQUIBASE_CHANGE_LOG: "filesystem:${EIP_BASE_DIR}/eip-core-environment/demo/mysql/02_initialization/changelog/db.changelog-master.yaml"

EIP_IGNORE_INFRA: "ibmmq,kafka,mongodb,redis"
EIP_LIQUIBASE_ENABLED: "true"
CAMEL_MAIN_ROUTES_INCLUDE_PATTERN: "file:${EIP_SCRIPT_DIR}/04_routes/**/*.yaml"
CAMEL_MAIN_DUMP_ROUTES: "true"
EIP_BOOTSTRAP_DISABLED: "true"
QUARKUS_LOG_LEVEL: "INFO"
QUARKUS_IBMMQ_ENABLED: "false"
QUARKUS_MONGODB_ENABLED: "false"
QUARKUS_REDIS_ENABLED: "false"
QUARKUS_ELASTICSEARCH_ENABLED: "false"
