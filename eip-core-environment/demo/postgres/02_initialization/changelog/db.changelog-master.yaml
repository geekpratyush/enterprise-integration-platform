databaseChangeLog:
  - changeSet:
      id: 1-postgres-create-refined-tables
      author: pratyush
      changes:
        - createTable:
            tableName: BUSINESS_DATA
            columns:
              - column:
                  name: ID
                  type: SERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: TXN_ID
                  type: VARCHAR(50)
              - column:
                  name: STATUS
                  type: VARCHAR(20)
              - column:
                  name: PAYLOAD
                  type: TEXT
              - column:
                  name: CREATED_AT
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        
        - createTable:
            tableName: AUDIT_EVENTS
            columns:
              - column:
                  name: AUDIT_ID
                  type: VARCHAR(50)
                  constraints:
                    primaryKey: true
              - column:
                  name: TIMESTAMP
                  type: VARCHAR(50)
              - column:
                  name: CORRELATION_ID
                  type: VARCHAR(50)
              - column:
                  name: ROUTE_ID
                  type: VARCHAR(50)
              - column:
                  name: IS_ENCRYPTED
                  type: BOOLEAN
              - column:
                  name: PAYLOAD
                  type: TEXT

        - createTable:
            tableName: COMPLEX_DATA
            columns:
              - column:
                  name: ID
                  type: SERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: IDENTIFIER
                  type: VARCHAR(50)
              - column:
                  name: NOTIFICATIONS
                  type: TEXT
              - column:
                  name: ATTACHMENT
                  type: BYTEA
