# redis.conf
# Industrialized Config for TLS/ACL Mission
# ----------------------------------------------------------------------

# TLS Configuration
port 0
tls-port 6379
tls-cert-file /certs/redis.crt
tls-key-file /certs/redis.key
tls-ca-cert-file /certs/ca.crt
tls-auth-clients yes

# ACL Configuration
# User: eip-user / eip-password
# Permissions: allkeys, allchannels, allcommands
user eip-user on >eip-password ~* &* +@all

# Security
protected-mode no
loglevel verbose
