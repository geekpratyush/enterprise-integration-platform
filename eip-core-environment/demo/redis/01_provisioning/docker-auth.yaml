# Redis (TLS/ACL Architecture)
# MISSION: Encrypted connectivity with User ACLs
# ----------------------------------------------------------------------
services:
  redis-platform:
    image: redis:7.2-alpine
    container_name: redis-platform
    ports:
      - "6379:6379"
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
      - ../02_initialization/certs/${MODE}:/certs
    networks:
      - redis-network
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]

networks:
  redis-network:
    name: redis-network
