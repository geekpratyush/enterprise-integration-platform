# routes.yaml
# Optimized Kafka Routes with granular property control

- route:
    id: "manual-commit-flow"
    from:
      uri: "kamelet:kafka-source"
      parameters:
        topic: "audit_log"
        consumerGroup: "manual-commit-group"
        autoOffsetReset: "earliest"
        allowManualCommit: true
      steps:
        - log: ">>> Processing message manually: ${body}"
        - to: "direct:complex-logic"
        - to: "kamelet:kafka-manual-commit-action"
        - log: ">>> Offset committed successfully."

- route:
    id: "batch-processing-flow"
    from:
      uri: "kamelet:kafka-batch-source"
      parameters:
        topic: "telemetry"
        batchSize: 50
        consumerGroup: "batch-consumer-group"
        autoOffsetReset: "earliest"
      steps:
        - log: ">>> Received batch of ${header.CamelKafkaBatchSize} messages"
        - split:
            simple: "${body}"
            steps:
              - log: ">>> Processing item in batch: ${body}"
        - to: "kamelet:kafka-batch-manual-commit-action"
        - log: ">>> Batch offset committed."

- route:
    id: "complex-logic"
    from:
      uri: "direct:complex-logic"
      steps:
        - setBody:
            simple: "PROCESSED: ${body}"

- route:
    id: "timer-to-kafka"
    from:
      uri: "timer:tick?period=2000&repeatCount=5"
      steps:
        - setBody:
            simple: "Standardized EIP message at ${date:now:yyyy-MM-dd HH:mm:ss}"
        - to:
            uri: "kamelet:kafka-sink"
            parameters:
              topic: "audit_log"
              # Recommended Production Properties:
              # acks=all ensures high durability
              # retries=3 handles transient broker failures
              additionalProperties: "acks=all&retries=3&max.block.ms=5000"
        - log: ">>> Sent message to Kafka: ${body}"
