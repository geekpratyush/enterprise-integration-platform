# advanced-routes.yaml
# Demonstrating Zero-Code technical metadata via Environment Profiles

- route:
    id: "manual-commit-flow"
    from:
      # Topic is mandatory in the Kamelet template; SSL/Bootstrap are auto-wired from env.
      uri: "kamelet:kafka-source?topic=audit_log&consumerGroup=manual-commit-group&al\
        lowManualCommit=true"
      steps:
        - log: ">>> Processing message manually: ${body}"
        - to: "direct:complex-logic"
        - to: "kamelet:kafka-manual-commit-action"
        - log: ">>> Offset committed successfully."

- route:
    id: "batch-processing-flow"
    from:
      # Topic is mandatory; SSL/Bootstrap are auto-wired from CAMEL_KAMELET_KAFKA_BATCH_SOURCE_...
      uri: "kamelet:kafka-batch-source?topic=telemetry&batchSize=50&consumerGroup=bat\
        ch-consumer-group"
      steps:
        - log: ">>> Received batch of ${header.CamelKafkaBatchSize} messages"
        - split:
            simple: "${body}"
            steps:
              - log: ">>> Processing item in batch: ${body}"
        - to: "kamelet:kafka-batch-manual-commit-action"
        - log: ">>> Batch offset committed."

- route:
    id: "complex-logic"
    from:
      uri: "direct:complex-logic"
      steps:
        - setBody:
            simple: "PROCESSED: ${body}"

- route:
    id: "timer-to-kafka"
    from:
      uri: "timer:tick?period=1000"
      steps:
        - setBody:
            simple: "Testing Kafka Audit Log message at ${date:now:yyyy-MM-dd HH:mm:ss}"
        - to: "kamelet:kafka-sink?topic=audit_log"
        - log: ">>> Sent message to Kafka: ${body}"
