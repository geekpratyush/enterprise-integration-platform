apiVersion: camel.apache.org/v1
kind: Kamelet
metadata:
  name: universal-db-sink
  labels:
    camel.apache.org/kamelet.type: "sink"
  annotations:
    camel.apache.org/kamelet.icon: "data:image/svg+xml;base64,"
    camel.apache.org/kamelet.group: "Data"
    camel.apache.org/provider: "Pratyush EIP"
spec:
  definition:
    title: "Universal DB Sink"
    description: "A low-code database abstraction layer that dynamically routes JSON payloads to Mongo or Postgres based on multi-tenant configuration."
    required:
      - tenantId
      - entityName
      - operation
    properties:
      tenantId:
        title: "Tenant ID"
        description: "The ID of the tenant (lookup in application.properties)."
        type: string
        example: "customer-a"
      entityName:
        title: "Entity Name"
        description: "The name of the collection (Mongo) or table (Postgres)."
        type: string
        example: "orders"
      operation:
        title: "Operation"
        description: "The database operation to perform."
        type: string
        enum: ["CREATE", "UPDATE", "DELETE"]
        default: "CREATE"
  template:
    from:
      uri: "kamelet:source"
      steps:
        # Step 1: Prepare headers for the translator
        - setHeader:
            name: "tenantId"
            constant: "{{tenantId}}"
        - setHeader:
            name: "entityName"
            constant: "{{entityName}}"
        - setHeader:
            name: "operation"
            constant: "{{operation}}"
        
        # Step 2: Call the Translation Engine (custom bean from the extension)
        - process:
            ref: "DbDialectTranslator"

        # Step 3: Dynamic Routing to the target component (Mongo or JDBC)
        # Note: 'CamelDbTargetUri' header is set by the translator
        - toD: "${header.CamelDbTargetUri}"
