apiVersion: camel.apache.org/v1alpha1
kind: Kamelet
metadata:
  name: eip-sql-action
  labels:
    camel.apache.org/kamelet.type: "action"
spec:
  definition:
    title: "EIP SQL Action"
    description: "Executes mid-route SQL queries or updates. Supports dynamic JSON-based filtering with operators ($like, $in, $gt, etc.)."
    required:
      - table
    properties:
      connectionBean:
        title: Connection Bean
        description: "The registered DataSource bean (e.g., eip)."
        type: string
        default: "dataSource"
      database:
        title: Database
        description: "The target database/schema name (optional)."
        type: string
        default: ""
      table:
        title: Table
        description: "The target table name."
        type: string
      operation:
        title: Operation
        description: "The database action to perform. 'findAll' uses the JSON body as an optional filter."
        type: string
        default: "findAll"
        enum: [ "findAll", "update", "delete", "query" ]
  template:
    from:
      uri: "kamelet:source"
      steps:
        - choice:
            when:
              - simple: "${body} is 'java.lang.String' && ${body} != ''"
                steps:
                  - unmarshal:
                      json:
                        library: "Jackson"
        - setHeader:
            name: "eip.sql.table"
            constant: "{{table}}"
        - setHeader:
            name: "eip.sql.database"
            constant: "{{database}}"
        - setHeader:
            name: "eip.sql.operation"
            constant: "{{operation}}"
        - setHeader:
            name: "dynamicQuery"
            groovy: |
              import com.fasterxml.jackson.databind.ObjectMapper
              import java.sql.Timestamp
              import java.time.Instant
              
              def table = request.headers.get('eip.sql.table')
              def db = request.headers.get('eip.sql.database')
              def fullTable = (db != null && !db.trim().isEmpty()) ? "${db}.${table}" : table
              def op = request.headers.get('eip.sql.operation')
              def body = request.body

              def buildWhere = { filterMap ->
                  if (!(filterMap instanceof Map) || filterMap.isEmpty()) return ""
                  def parts = []
                  filterMap.each { k, v ->
                      def paramName = "f_" + k
                      if (v instanceof Map) {
                          // Handle Operators
                          if (v.containsKey('$like')) {
                              request.headers.put(paramName, v.get('$like'))
                              parts.add("${k} LIKE :?${paramName}")
                          } else if (v.containsKey('$gt')) {
                              request.headers.put(paramName, v.get('$gt'))
                              parts.add("${k} > :?${paramName}")
                          } else if (v.containsKey('$lt')) {
                              request.headers.put(paramName, v.get('$lt'))
                              parts.add("${k} < :?${paramName}")
                          } else if (v.containsKey('$ne')) {
                              request.headers.put(paramName, v.get('$ne'))
                              parts.add("${k} <> :?${paramName}")
                          }
                      } else if (v instanceof List) {
                          // Handle IN clause
                          request.headers.put(paramName, v)
                          parts.add("${k} IN (:?${paramName})")
                      } else {
                          // Standard Equality
                          request.headers.put(paramName, v)
                          parts.add("${k} = :?${paramName}")
                      }
                  }
                  return " WHERE " + parts.join(" AND ")
              }

              if (op == "findAll") {
                  def where = buildWhere(body)
                  return "SELECT * FROM ${fullTable}${where}"
              } 

              if (op == "update") {
                  if (body instanceof List && body.size() == 2) {
                      def filter = body[0]
                      def update = body[1]
                      def setFields = (update instanceof Map && update.containsKey('$set')) ? update['$set'] : update
                      
                      def setParts = []
                      def mapper = new ObjectMapper()
                      setFields.each { k, v ->
                          def paramName = "u_" + k
                          request.headers.put(paramName, v)
                          setParts.add("${k} = :?${paramName}")
                      }
                      
                      def where = buildWhere(filter)
                      return "UPDATE ${fullTable} SET ${setParts.join(', ')}${where}"
                  }
                  throw new RuntimeException("Update requires [filter, update] list body")
              }

              if (op == "delete") {
                  def where = buildWhere(body)
                  return "DELETE FROM ${fullTable}${where}"
              }

              if (op == "query") {
                  if (body instanceof Map) {
                      body.each { k, v -> request.headers.put(k, v) }
                      return body.get("_sql") ?: "SELECT 1"
                  }
                  return body.toString()
              }
              return ""
        - setBody:
            simple: "${header.dynamicQuery}"
        - to:
            uri: "sql:dynamic?dataSource=#{{connectionBean}}&useMessageBodyForSql=true"
        - choice:
            when:
              - simple: "${header.eip.sql.operation} == 'findAll' || ${header.eip.sql.operation} == 'query'"
                steps:
                  - script:
                      groovy: |
                          import java.time.format.DateTimeFormatter
                          import java.time.ZoneOffset
                          def result = request.body
                          if (result instanceof List) {
                              result.each { row ->
                                  if (row instanceof Map) {
                                      row.each { k, v ->
                                          if (v instanceof java.sql.Timestamp) {
                                              row.put(k, v.toInstant().atOffset(ZoneOffset.UTC).format(DateTimeFormatter.ISO_INSTANT))
                                          } else if (v instanceof java.sql.Date) {
                                              row.put(k, v.toLocalDate().toString())
                                          } else if (v instanceof java.sql.Blob) {
                                              row.put(k, ['$blob': v.getBytes(1, (int) v.length()).encodeBase64().toString()])
                                          }
                                      }
                                  }
                              }
                          }
        - log: ">>> [SQL-ACTION] Completed {{operation}} on {{table}}"
