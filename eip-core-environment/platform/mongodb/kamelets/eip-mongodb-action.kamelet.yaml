apiVersion: camel.apache.org/v1alpha1
kind: Kamelet
metadata:
  name: eip-mongodb-action
  labels:
    camel.apache.org/kamelet.type: "action"
spec:
  definition:
    title: "EIP MongoDB Action"
    description: "Perform mid-route MongoDB operations (Update, Delete, Find) using a named registry bean."
    required:
      - database
      - collection
      - operation
    properties:
      connectionBean:
        title: "MongoClient Bean Name"
        description: "The name of the MongoClient bean in the registry"
        type: "string"
        default: "mongoClient"
      database:
        title: "Database"
        description: "The MongoDB database name"
        type: "string"
      collection:
        title: "Collection"
        description: "The MongoDB collection name"
        type: "string"
      operation:
        title: "Operation"
        description: "The MongoDB operation to perform (e.g., update, delete, findOneByQuery)"
        type: "string"
  template:
    from:
      uri: "kamelet:source"
      steps:
        - to: "mongodb:{{connectionBean}}?database={{database}}&collection={{collection}}&operation={{operation}}"
