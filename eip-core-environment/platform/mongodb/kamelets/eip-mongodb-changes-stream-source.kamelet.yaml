apiVersion: camel.apache.org/v1alpha1
kind: Kamelet
metadata:
  name: eip-mongodb-changes-stream-source
  labels:
    camel.apache.org/kamelet.type: "source"
spec:
  definition:
    title: "EIP MongoDB Changes Stream Source"
    description: "Monitors a MongoDB collection for real-time changes (CDC) using a named registry bean."
    required:
      - database
      - collection
    properties:
      connectionBean:
        title: "MongoClient Bean Name"
        description: "The name of the MongoClient bean in the registry"
        type: "string"
        default: "mongoClient"
      database:
        title: "Database"
        description: "The MongoDB database name"
        type: "string"
      collection:
        title: "Collection"
        description: "The MongoDB collection name"
        type: "string"
  template:
    from:
      uri: "mongodb:{{connectionBean}}?database={{database}}&collection={{collection}}&consumerType=changeStreams"
      steps:
        - to: "kamelet:sink"
