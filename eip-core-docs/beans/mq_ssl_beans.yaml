- beans:

    # =========================================================================
    # SSL SOCKET FACTORY  (mTLS client identity)
    # Identical to ssl-tx variant — mTLS is independent of transaction mode.
    # =========================================================================
    - name: "sslContextMQ"
      type: "com.pratyush.eip.core.lib.util.EipSslSocketFactory"
      properties:
        trustStorePath:     "{{env:MQ_A_TRUSTSTORE_PATH:}}"
        trustStorePassword: "{{env:MQ_A_TRUSTSTORE_PASS:}}"
        keyStorePath:       "{{env:MQ_A_KEYSTORE_PATH:}}"
        keyStorePassword:   "{{env:MQ_A_KEYSTORE_PASS:}}"

    # =========================================================================
    # IBM MQ CONNECTION FACTORY  (mTLS, no user/pass)
    # =========================================================================
    - name: "mqFactSSL"
      type: "com.ibm.mq.jakarta.jms.MQConnectionFactory"
      properties:
        hostName:            "{{env:MQ_HOST:localhost}}"
        port:                "{{env:MQ_PORT:1415}}"
        queueManager:        "{{env:MQ_QMGR:QM_SSL}}"
        channel:             "{{env:MQ_CHANNEL:DEV.APP.SVRCONN}}"
        # Java JSSE name (useIBMCipherMappings=false set in EipSslSocketFactory)
        sslCipherSuite:      "{{env:MQ_SSL_CIPHER:TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384}}"
        sslSocketFactory:    "#sslContextMQ"
        transportType:       1         # CLIENT transport
        authenticationMQCSP: false     # identity via client cert, not user/pass

    # =========================================================================
    # HIGH-PERFORMANCE CONNECTION POOL
    # Total session capacity = MQ_A_MAX_CONNECTIONS × MQ_A_MAX_SESSIONS_PER_CONNECTION
    # =========================================================================
    - name: "poolSSL"
      type: "org.messaginghub.pooled.jms.JmsPoolConnectionFactory"
      properties:
        connectionFactory: "#mqFactSSL"

        # Number of physical TCP connections to IBM MQ.
        maxConnections: "{{env:MQ_A_MAX_CONNECTIONS:10}}"

        # JMS sessions multiplexed per connection.
        maxSessionsPerConnection: "{{env:MQ_A_MAX_SESSIONS_PER_CONNECTION:10}}"

        # Idle physical connections are closed after this ms (0 = never).
        connectionIdleTimeout: "{{env:MQ_A_CONN_IDLE_TIMEOUT_MS:30000}}"

        # Anonymous producers are safe in non-transacted mode.
        useAnonymousProducers: "{{env:MQ_A_ANON_PRODUCERS:true}}"

        # Block callers when all sessions are in use (true = backpressure).
        blockIfSessionPoolIsFull: "{{env:MQ_A_BLOCK_IF_FULL:true}}"

        # Max ms to block before throwing if pool is full (0 = block forever).
        blockIfSessionPoolIsFullTimeout: "{{env:MQ_A_BLOCK_TIMEOUT_MS:5000}}"

    # =========================================================================
    # JMS COMPONENT  (non-transacted — CLIENT_ACKNOWLEDGE mode)
    #
    # No jmsTxManager bean — there is no JMS local transaction here.
    # Resiliency is provided by Camel's deadLetterChannel error handler in the
    # route file, which routes failed messages to the DLQ after exhausting
    # in-memory retries.
    #
    # CLIENT_ACKNOWLEDGE mode:
    #   Camel auto-acknowledges the JMS message only after the route completes
    #   successfully. On failure, Camel retries in-memory. After all retries
    #   are exhausted, deadLetterChannel routes the message to the DLQ and then
    #   acknowledges the original — preventing message loss without transactions.
    # =========================================================================
    - name: "jms"
      type: "org.apache.camel.component.jms.JmsComponent"
      properties:
        connectionFactory: "#poolSSL"

        # CLIENT_ACKNOWLEDGE: Camel acks only after successful route completion.
        # Contrast with AUTO_ACKNOWLEDGE (acks immediately — unsafe on failure).
        acknowledgementModeName: "{{env:JMS_A_ACK_MODE:CLIENT_ACKNOWLEDGE}}"

        # CACHE_CONSUMER: each consumer thread keeps its MessageConsumer open.
        # Best mode for concurrent non-transacted consumers.
        cacheLevelName: "{{env:JMS_A_CACHE_LEVEL:CACHE_CONSUMER}}"

        # Threads always actively polling the queue.
        concurrentConsumers: "{{env:JMS_A_CONCURRENT_CONSUMERS:5}}"

        # Upper limit for dynamic thread scaling during bursts.
        maxConcurrentConsumers: "{{env:JMS_A_MAX_CONCURRENT_CONSUMERS:20}}"

        # transacted MUST be false — using CLIENT_ACKNOWLEDGE instead.
        transacted: "{{env:JMS_A_TRANSACTED:false}}"

        # How long (ms) a consumer polls before looping. Lower = lower latency.
        receiveTimeout: "{{env:JMS_A_RECEIVE_TIMEOUT_MS:500}}"

        # Write messages to persistent store on broker — survive MQ restart.
        deliveryPersistent: "{{env:JMS_A_DELIVERY_PERSISTENT:true}}"

        # -1 = thread processes messages without limit (highest throughput).
        maxMessagesPerTask: "{{env:JMS_A_MAX_MSG_PER_TASK:-1}}"

        # A dynamic consumer thread stops after this many idle receive loops.
        idleConsumerLimit: "{{env:JMS_A_IDLE_CONSUMER_LIMIT:1}}"
