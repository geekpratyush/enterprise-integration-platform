apiVersion: camel.apache.org/v1
kind: Kamelet
metadata:
  name: ssl-jms-source
  labels:
    camel.apache.org/kamelet.type: "source"
  annotations:
    camel.apache.org/kamelet.version: "1.0.0"
    camel.apache.org/provider: "EIP Platform"
spec:
  definition:
    title: "SSL JMS Source"
    description: >
      Consumes messages from a secure JMS queue (e.g., IBM MQ with mTLS) 
      using a pre-configured JMS component registered in the Camel context.
    required:
      - queueName
    properties:
      queueName:
        title: Queue Name
        description: JMS queue to consume from.
        type: string
      jmsComponent:
        title: JMS Component Name
        description: >
          Name of the JmsComponent registered in the Camel context.
          Defaults to 'jms'.
        type: string
        default: "jms"
      concurrentConsumers:
        title: Concurrent Consumers
        description: Number of parallel JMS listener threads.
        type: integer
        default: 1
      maxConcurrentConsumers:
        title: Max Concurrent Consumers
        description: Upper bound on dynamic scaling of listener threads.
        type: integer
        default: 5
  template:
    from:
      uri: "{{jmsComponent}}:queue:{{queueName}}"
      parameters:
        concurrentConsumers: "{{concurrentConsumers}}"
        maxConcurrentConsumers: "{{maxConcurrentConsumers}}"
      steps:
        - log:
            message: "[ssl-jms-source] received from {{queueName}}: ${body}"
            loggingLevel: "DEBUG"
