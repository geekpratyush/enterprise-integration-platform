apiVersion: camel.apache.org/v1
kind: Kamelet
metadata:
  name: ssl-jms-sink
  labels:
    camel.apache.org/kamelet.type: "sink"
  annotations:
    camel.apache.org/kamelet.version: "1.0.0"
    camel.apache.org/provider: "EIP Platform"
spec:
  definition:
    title: "SSL JMS Sink"
    description: >
      Publishes messages to a secure JMS queue (e.g., IBM MQ with mTLS) 
      using a pre-configured JMS component registered in the Camel context.
    required:
      - queueName
    properties:
      queueName:
        title: Queue Name
        description: JMS queue to publish to.
        type: string
      jmsComponent:
        title: JMS Component Name
        description: >
          Name of the JmsComponent registered in the Camel context.
          Defaults to 'jms'.
        type: string
        default: "jms"
      deliveryPersistent:
        title: Delivery Persistent
        description: Whether messages are stored persistently on the broker.
        type: boolean
        default: true
  template:
    from:
      uri: "kamelet:source"
      steps:
        - log:
            message: "[ssl-jms-sink] sending to {{queueName}}: ${body}"
            loggingLevel: "DEBUG"
        - to:
            uri: "{{jmsComponent}}:queue:{{queueName}}"
            parameters:
              deliveryPersistent: "{{deliveryPersistent}}"
