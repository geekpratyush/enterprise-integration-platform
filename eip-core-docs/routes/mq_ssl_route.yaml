# =============================================================================
# ERROR HANDLER — Dead Letter Channel (non-transacted SSL mode)
#
# Resiliency without JMS transactions:
#   1. Camel retries the route in-memory (exponential backoff).
#   2. After all retries exhausted, the ORIGINAL message is automatically
#      sent to the Dead Letter Queue (DLQ) by Camel's deadLetterChannel.
#   3. After DLQ routing, Camel acknowledges the original JMS message
#      (CLIENT_ACKNOWLEDGE) — it is removed from the source queue.
#
# Result: NO message loss without JMS transaction overhead.
#
# useOriginalMessage: true  — sends the unmodified original body to DLQ,
#   not any partial result from a failed processing step.
# =============================================================================
- errorHandler:
    deadLetterChannel:
      deadLetterUri: "jms:queue:{{env:MQ_A_DLQ:DEV.DEAD.LETTER.QUEUE.1}}"
      useOriginalMessage: true
      redeliveryPolicy:
        maximumRedeliveries: "{{env:CAMEL_A_MAX_REDELIVERIES:3}}"
        redeliveryDelay: "{{env:CAMEL_A_REDELIVERY_DELAY_MS:1000}}"
        maximumRedeliveryDelay: "{{env:CAMEL_A_MAX_REDELIVERY_DELAY_MS:30000}}"
        backOffMultiplier: "{{env:CAMEL_A_BACKOFF_MULTIPLIER:2.0}}"
        useExponentialBackOff: true
        retryAttemptedLogLevel: "WARN"
        retriesExhaustedLogLevel: "ERROR"

# =============================================================================
# SSL CONSUMER ROUTE  (no JMS transaction — CLIENT_ACKNOWLEDGE safety)
#
# CLIENT_ACKNOWLEDGE semantics in Camel:
#   SUCCESS path: route completes → Camel auto-acks → message removed from queue.
#   FAILURE path: deadLetterChannel retries N times → routes original to DLQ
#                 → Camel acks original → no message loss.
#
# Note: No backout counter (JMSXDeliveryCount) increments here — all retry
# decisions are made within Camel, not by IBM MQ broker backout logic.
# =============================================================================
- route:
    id: "ssl-consumer"
    from:
      uri: "jms:queue:{{env:MQ_A_CONSUME_QUEUE:DEV.QUEUE.1}}"
      steps:
        - log:
            message: "Consuming msg[${header.JMSMessageID}]: ${body}"
            loggingLevel: "{{env:CAMEL_A_CONSUME_LOG_LEVEL:DEBUG}}"

        # ======================================================
        # YOUR PROCESSING LOGIC HERE
        # Throw any exception to trigger in-memory Camel retry.
        # After retries exhausted the original message is routed
        # to DLQ (MQ_A_DLQ) and then acknowledged.
        # ======================================================

        - log:
            message: "Processed msg[${header.JMSMessageID}]"
            loggingLevel: "INFO"

# =============================================================================
# TEST PRODUCER ROUTE  (fires a test message on a timer)
# Disable: set CAMEL_A_PRODUCER_TEST_PERIOD_MS=0
# =============================================================================
- route:
    id: "ssl-producer-test"
    from:
      uri: "timer:ssl-test?period={{env:CAMEL_A_PRODUCER_TEST_PERIOD_MS:1000}}&delay={{env:CAMEL_A_PRODUCER_TEST_DELAY_MS:5000}}"
      steps:
        - setBody:
            constant: "{{env:CAMEL_A_TEST_PAYLOAD:Secure Hello over mTLS!}}"
        - to: "jms:queue:{{env:MQ_A_PRODUCE_QUEUE:DEV.QUEUE.1}}"
        - log:
            message: "Sent test message: ${body}"
            loggingLevel: "INFO"
