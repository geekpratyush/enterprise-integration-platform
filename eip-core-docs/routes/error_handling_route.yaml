- route:
    id: "error-producer-test"
    from:
      # Automatically fire an error test periodically
      uri: "timer:error-source?period={{env:ERROR_TEST_PERIOD_MS:10000}}&delay={{env:ERROR_TEST_DELAY_MS:10000}}"
    onException:
      - exception: ["java.lang.RuntimeException"]
        handled: true  # Prevents propagating back to source since it's a test
        steps:
          - log: "Resiliency Test: Caught intentional exception. Redirecting to log route..."
          - to: "direct:log-error-route"
    steps:
      - setBody:
          constant: "Original Error Test Payload"
      - log: "Simulating processing failure for message: ${body}"
      # Intentionally causing an exception for testing
      - throwException:
          exceptionType: "java.lang.RuntimeException"
          message: "INTENTIONAL_ERROR: Test failure in processing step."

- route:
    id: "log-error-route"
    from:
      uri: "direct:log-error-route"
      steps:
        - log: "LOG_ROUTE: Entering audit path for failed message..."
        - setHeader:
            name: "ErrorTimestamp"
            simple: "${date:now:yyyy-MM-dd HH:mm:ss}"
        - log: "AUDIT: FAILED_MSG[${id}] - RECEIVED AT: ${header.ErrorTimestamp}"
        - to: "log:audit-error?level=ERROR&showAll=true"

