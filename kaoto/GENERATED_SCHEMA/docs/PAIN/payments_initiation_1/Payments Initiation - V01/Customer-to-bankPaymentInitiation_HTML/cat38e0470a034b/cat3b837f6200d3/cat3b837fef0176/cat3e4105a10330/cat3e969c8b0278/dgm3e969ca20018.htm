<meta name="Description" content="Scenario with ePI exchanged between customers.    The scenario shows how an ePI (electronic Payment Initiator) can be used between customers (eg seller and buyer) to exchange payment information related to an e-invoice. The information from the ePI can be mapped into the payment initiation message sent by the customer (eg the buyer) to its bank.  Steps :  · The creditor sends the eInvoice + ePI to the debtor, either directly or via a business specific service provider or organisation.  · The debtor receives the invoice with the ePI and completes the payment instruction with the debit account.  · The ePI will be transformed into a customer-to-bank payment initiation message, which is authorised and sent to the debtor's bank for execution.    Notes:     1) Assumption is that Payment Initiation Status is positive. The sending of and the content of a Payment Initiation Status message depends on bilateral service agreed between first agent and initiating party.  2)  At requested execution date, the first agent will debit the account of the debtor.  Once the first agent debits the account of the debtor (at requested execution date), it may  need to generate customer debit advice and/or statement - depending on service agreed between debtor/initiating party and the first agent and depending on legal requirements. The advice and/or statement info will normally be sent to the debtor, unless otherwise agreed between debtor and first agent.  3) There is no indication of chronological order in the status/debit advice/statement information sent in the scenario above, as this will also depend on agreements between debtor/initiating party and the first agent, but banks implementing and offering these services will define a logical, chronological sequence for sending these messages.  4) Furthermore, there may also be interbank advices/statements exchanged, but these are not included in the diagram as this will depend on the settlement method chosen between first and final agent.">
