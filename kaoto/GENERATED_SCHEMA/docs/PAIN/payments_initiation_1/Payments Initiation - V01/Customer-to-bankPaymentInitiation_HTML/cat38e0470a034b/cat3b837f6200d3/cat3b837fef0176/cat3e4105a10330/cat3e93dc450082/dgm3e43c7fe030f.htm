<meta name="Description" content="In this scenario, the head office has to pay eg an invoice (ie is the originating and initiating party), and will initiate the payment to the first agent, but head office is using the account of a subsidiary at the first agent to make the payment, not their own account.  In this case, the subsidiary is the debtor.    Notes:     1) Assumption is that Payment Initiation Status is positive. The sending of and the content of a Payment Initiation Status message depends on bilateral service agreed between first agent and initiating party.  2)  At requested execution date, the first agent will debit the account of the debtor.  Once the first agent debits the account of the debtor (at requested execution date), it may  need to generate customer debit advice and/or statement - depending on service agreed between debtor/initiating party and the first agent and depending on legal requirements. The advice and/or statement info will normally be sent to the debtor, unless otherwise agreed between debtor and first agent.  3) There is no indication of chronological order in the status/debit advice/statement information sent in the scenario above, as this will also depend on agreements between debtor/initiating party and the first agent, but banks implementing and offering these services will define a logical, chronological sequence for sending these messages.  4) Furthermore, there may also be interbank advices/statements exchanged, but these are not included in the diagram as this will depend on the settlement method chosen between first and final agent.">
