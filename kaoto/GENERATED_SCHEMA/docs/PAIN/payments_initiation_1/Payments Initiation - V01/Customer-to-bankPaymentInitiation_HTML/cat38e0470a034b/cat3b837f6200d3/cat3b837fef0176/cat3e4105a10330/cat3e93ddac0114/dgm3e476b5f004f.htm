<meta name="Description" content="In this scenario, the debtor (ie the account owner at the first agent) is also the party initiating the payment (initiating party).    The debtor requests its gateway agent (ie, the forwarding agent) to forward the instruction to the first agent, which services an account for the debtor.  The function of the forwarding agent is a 'relay' function, ie, the forwarding agent needs to forward the instruction to the first agent.     The final agent is the account servicer of the creditor.    Notes :   1) agreements need to be in place between all parties involved to execute this scenario.    2) Assumption is that Payment Initiation Status is in all instances positive and can be sent at different stages (and by different roles) in the lifecycle. The sending of and the content of a Payment Initiation Status message depends on bilateral service agreed between first agent, forwarding agent and initiating party. Assumption is made that the Payment Initiation status information follows the same route as the payment initiation.  2)  At requested execution date, the first agent will debit the account of the debtor. Once the first agent debits the account of the debtor (at requested execution date), it may  need to generate customer debit advice and/or statement - depending on service agreed between debtor/initiating party and the first agent and depending on legal requirements. The advice and/or statement info will normally be sent to the debtor, through the forwarding agent,unless otherwise agreed between debtor and first agent. Assumption is made that the debit advice/statement information follows the same route as the payment initiation.    3) There is no indication of chronological order in the status/debit advice/statement information sent in the scenario above, as this will also depend on agreements between debtor/initiating party and the first agent, but banks implementing and offering these services will define a logical, chronological sequence for sending these messages.  4) Furthermore, there may also be interbank advices/statements exchanged, but these are not included in the diagram as this will depend on the settlement method chosen between first and final agent.">
