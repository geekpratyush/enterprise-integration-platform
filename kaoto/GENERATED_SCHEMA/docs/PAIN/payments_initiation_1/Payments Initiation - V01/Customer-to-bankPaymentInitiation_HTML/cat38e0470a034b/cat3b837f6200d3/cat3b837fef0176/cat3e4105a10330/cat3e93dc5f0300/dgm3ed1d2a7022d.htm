<meta name="Description" content="In this scenario, the debtor (ie the account owner at the first agent) equals the originating party that receives the invoice.  The debtor works with a shared service center (ie not a financial institution, but an organisation) which will initiate the payment on behalf of the debtor.  In this case, the shared service center is only the 'initiating party' ie the gateway for the debtor, to access its bank.  The shared service center will not need to be identified further down in the interbank chain, it is a technical role, collecting files from its customers, and then passing them on to the first agent in the chain.    Notes:     1) Assumption is that Payment Initiation Status is positive. The sending of and the content of a Payment Initiation Status message depends on bilateral service agreed between first agent and initiating party.  2)  At requested execution date, the first agent will debit the account of the debtor.  Once the first agent debits the account of the debtor (at requested execution date), it may  need to generate customer debit advice and/or statement - depending on service agreed between debtor/initiating party and the first agent and depending on legal requirements. The advice and/or statement info will normally be sent to the debtor, unless otherwise agreed between debtor and first agent.  3) There is no indication of chronological order in the status/debit advice/statement information sent in the scenario above, as this will also depend on agreements between debtor/initiating party and the first agent, but banks implementing and offering these services will define a logical, chronological sequence for sending these messages.  4) Furthermore, there may also be interbank advices/statements exchanged, but these are not included in the diagram as this will depend on the settlement method chosen between first and final agent.">
