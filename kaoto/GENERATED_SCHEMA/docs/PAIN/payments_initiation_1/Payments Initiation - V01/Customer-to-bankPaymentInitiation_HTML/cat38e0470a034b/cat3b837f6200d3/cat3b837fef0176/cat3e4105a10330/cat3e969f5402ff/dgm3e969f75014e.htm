<meta name="Description" content="Scenario with ePI exchanged between creditor and final agent.    · The creditor sends the eInvoice + ePI in XML format to his/her bank (creditor's bank/final agent)   · The creditor's bank forwards the eInvoice + ePI in XML format to the debtor's bank (/first agent)  · The debtor receives the invoice with a payment initiator through his/her bank (debtor's bank) and completes the payment instruction with the debit account.  · It enables automation of invoice handling, payment processing and bookkeeping.  · The ePI will be transformed into a Customer-to-bank payment initiation message, which is authorised and sent to the debtor's bank for execution.    Notes:     1) Assumption is that Payment Initiation Status is positive. The sending of and the content of a Payment Initiation Status message depends on bilateral service agreed between first agent and initiating party.  2)  At requested execution date, the first agent will debit the account of the debtor. Once the first agent debits the account of the debtor (at requested execution date), it may  need to generate customer debit advice and/or statement - depending on service agreed between debtor/initiating party and the first agent and depending on legal requirements. The advice and/or statement info will normally be sent to the debtor, unless otherwise agreed between debtor and first agent.  3) There is no indication of chronological order in the status/debit advice/statement information sent in the scenario above, as this will also depend on agreements between debtor/initiating party and the first agent, but banks implementing and offering these services will define a logical, chronological sequence for sending these messages.  4) Furthermore, there may also be interbank advices/statements exchanged, but these are not included in the diagram as this will depend on the settlement method chosen between first and final agent.">
