apiVersion: camel.apache.org/v1
kind: Kamelet
metadata:
  name: ibmmq-source
  labels:
    camel.apache.org/kamelet.type: "source"
  annotations:
    camel.apache.org/kamelet.version: "1.0.0"
    camel.apache.org/provider: "EIP Platform"
spec:
  definition:
    title: "IBM MQ Source"
    description: >
      Consumes messages from an IBM MQ queue using a pre-configured
      JMS component registered in the Camel context.
      The component name (jmsComponent) must match a camel component bean
      that wraps a JmsComponent configured with the target MQ connection factory.
    required:
      - queueName
    properties:
      queueName:
        title: Queue Name
        description: IBM MQ queue to consume from (e.g. DEV.QUEUE.1).
        type: string
      jmsComponent:
        title: JMS Component Name
        description: >
          Name of the JmsComponent registered in the Camel context.
          Defaults to 'jms' — register a bean named 'jms' of type
          org.apache.camel.component.jms.JmsComponent in your beans YAML.
        type: string
        default: "jms"
      concurrentConsumers:
        title: Concurrent Consumers
        description: Number of parallel JMS listener threads.
        type: integer
        default: 1
      maxConcurrentConsumers:
        title: Max Concurrent Consumers
        description: Upper bound on dynamic scaling of listener threads.
        type: integer
        default: 5
      maxRedeliveries:
        title: Max Redeliveries
        description: Camel redelivery attempts before routing to DLQ.
        type: integer
        default: 3
      redeliveryDelay:
        title: Redelivery Delay (ms)
        description: Initial delay before first retry.
        type: integer
        default: 1000
  template:
    from:
      uri: "{{jmsComponent}}:queue:{{queueName}}"
      parameters:
        concurrentConsumers: "{{concurrentConsumers}}"
        maxConcurrentConsumers: "{{maxConcurrentConsumers}}"
      steps:
        - log:
            message: "[ibmmq-source] received from {{queueName}}: ${body}"
            loggingLevel: "DEBUG"
