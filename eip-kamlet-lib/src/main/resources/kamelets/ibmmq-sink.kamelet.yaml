apiVersion: camel.apache.org/v1
kind: Kamelet
metadata:
  name: ibmmq-sink
  labels:
    camel.apache.org/kamelet.type: "sink"
  annotations:
    camel.apache.org/kamelet.version: "1.0.0"
    camel.apache.org/provider: "EIP Platform"
spec:
  definition:
    title: "IBM MQ Sink"
    description: >
      Publishes messages to an IBM MQ queue using a pre-configured
      JMS component registered in the Camel context.
      The component name (jmsComponent) must match a camel component bean
      that wraps a JmsComponent configured with the target MQ connection factory.
    required:
      - queueName
    properties:
      queueName:
        title: Queue Name
        description: IBM MQ queue to publish to (e.g. DEV.QUEUE.1).
        type: string
      jmsComponent:
        title: JMS Component Name
        description: >
          Name of the JmsComponent registered in the Camel context.
          Defaults to 'jms'.
        type: string
        default: "jms"
      deliveryPersistent:
        title: Delivery Persistent
        description: Whether messages are stored persistently on the broker.
        type: boolean
        default: true
  template:
    from:
      uri: "kamelet:source"
      steps:
        - log:
            message: "[ibmmq-sink] sending to {{queueName}}: ${body}"
            loggingLevel: "DEBUG"
        - to:
            uri: "{{jmsComponent}}:queue:{{queueName}}"
            parameters:
              deliveryPersistent: "{{deliveryPersistent}}"
