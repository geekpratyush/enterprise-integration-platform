databaseChangeLog:
  - changeSet:
      id: 1-sqlserver-create-audit-log
      author: pratyush
      dbms: mssql
      changes:
        - createTable:
            tableName: audit_log
            columns:
              - column:
                  name: id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: txn_id
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: NVARCHAR(MAX)
              - column:
                  name: created_at
                  type: DATETIME
                  defaultValueComputed: GETDATE()
