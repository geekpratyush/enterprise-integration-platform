
quarkus.devservices.enabled=false
quarkus.mongodb.enabled=false
quarkus.mongodb.health.enabled=false
quarkus.mongodb.connection-string=
quarkus.rest.provider=reactive
camel.component.mongodb.autowired-enabled=false

