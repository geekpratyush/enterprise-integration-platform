quarkus.log.category."org.mongodb.driver".level=OFF
quarkus.log.category."org.apache.camel.impl.debugger".level=ERROR

# Liquibase Configuration
quarkus.liquibase.enabled=${EIP_LIQUIBASE_ENABLED:false}
quarkus.liquibase.migrate-at-start=${EIP_LIQUIBASE_MIGRATE_AT_START:false}
quarkus.liquibase.change-log=db/changelog/db.changelog-main.yaml

