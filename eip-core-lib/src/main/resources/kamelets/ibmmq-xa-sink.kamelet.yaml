apiVersion: camel.apache.org/v1
kind: Kamelet
metadata:
  name: ibmmq-xa-sink
  labels:
    camel.apache.org/kamelet.type: "sink"
  annotations:
    camel.apache.org/kamelet.title: "IBM MQ Sink (XA/JTA)"
    camel.apache.org/kamelet.version: "4.0.0"
    camel.apache.org/provider: "EIP Platform"
    camel.apache.org/kamelet.support.level: "Stable"
    camel.apache.org/kamelet.group: "JMS"
    camel.apache.org/kamelet.namespace: "Messaging"
spec:
  definition:
    title: "IBM MQ Sink (XA / JTA)"
    description: >
      Publishes messages to an IBM MQ queue using a pre-configured XA connection
      pool enlisted in a JTA (Narayana) distributed transaction.
      XA CONTRACT — these constraints must NOT be overridden:
        transacted = false     JTA owns the transaction boundary.
    required:
      - queuename
    type: object
    properties:
      queuename:
        title: Queue Name
        type: string
      username:
        title: Username
        type: string
        default: ""
      password:
        title: Password
        type: string
        format: password
        default: ""
      transacted:
        title: Transacted
        type: boolean
        default: false
      deliverypersistent:
        title: Delivery Persistent
        type: boolean
        default: true
      deliverydelay:
        title: Delivery Delay (ms)
        type: integer
        default: 0
      timetolive:
        title: Time To Live (ms)
        type: integer
        default: 0
      hostname:
        title: Host Name
        type: string
        default: localhost
      port:
        title: Port
        type: integer
        default: 1414
      queuemanager:
        title: Queue Manager
        type: string
        default: QM1
      channel:
        title: Channel
        type: string
        default: DEV.APP.SVRCONN
      sslciphersuite:
        title: SSL Cipher Suite
        type: string
        default: ""
      sslpeername:
        title: SSL Peer Name
        type: string
        default: ""
      useibmciphermappings:
        title: Use IBM Cipher Mappings
        type: boolean
        default: false
      debugssl:
        title: Debug SSL
        type: boolean
        default: false
      eagerinit:
        title: Eager SSL Init
        description: Build the SSLContext at startup instead of on first use
        type: boolean
        default: false
      reloadperiodseconds:
        title: SSL Reload Period (seconds)
        description: Rebuild SSLContext from disk at this interval for zero-restart cert rotation. 0 disables reloading.
        type: integer
        default: 0
      truststorepath:
        title: TrustStore Path
        type: string
        default: ""
      truststorepassword:
        title: TrustStore Password
        type: string
        format: password
        default: ""
      keystorepath:
        title: KeyStore Path
        type: string
        default: ""
      keystorepassword:
        title: KeyStore Password
        type: string
        format: password
        default: ""
      authenticationmqcsp:
        title: Authentication MQCSP
        type: boolean
        default: true
      authenticationtoken:
        title: Authentication Token
        type: string
      authenticationtype:
        title: Authentication Type
        type: integer
      maxconnections:
        title: Max Connections
        type: integer
        default: 5

  template:
    beans:
      - name: sslFactory
        type: "#class:com.pratyush.eip.core.lib.crypto.EipSslSocketFactory"
        properties:
          trustStorePath: '{{truststorepath}}'
          trustStorePassword: '{{truststorepassword}}'
          keyStorePath: '{{keystorepath}}'
          keyStorePassword: '{{keystorepassword}}'
          useIbmCipherMappings: '{{useibmciphermappings}}'
          debugSsl: '{{debugssl}}'
          eagerInit: '{{eagerinit}}'
          reloadPeriodSeconds: '{{reloadperiodseconds}}'

      - name: mqXAConnectionFactory
        type: "#class:com.ibm.mq.jakarta.jms.MQXAConnectionFactory"
        properties:
          hostName: '{{hostname}}'
          port: '{{port}}'
          queueManager: '{{queuemanager}}'
          channel: '{{channel}}'
          transportType: 1
          authenticationMQCSP: '{{authenticationmqcsp}}'
          authenticationToken: '{{?authenticationtoken}}'
          authenticationType: '{{?authenticationtype}}'
          sslCipherSuite: '{{sslciphersuite}}'
          sslPeerName: '{{?sslpeername}}'
          sslSocketFactory: '#bean:{{sslFactory}}'

      - name: mqXAPoolFactory
        type: "#class:org.messaginghub.pooled.jms.JmsPoolXAConnectionFactory"
        properties:
          connectionFactory: '#bean:{{mqXAConnectionFactory}}'
          transactionManager: '#bean:transactionManager'
          maxConnections: '{{maxconnections}}'

    from:
      uri: "kamelet:source"
      steps:
        - to:
            uri: "jms:queue:{{queuename}}"
            parameters:
              connectionFactory: "#bean:{{mqXAPoolFactory}}"
              transactionManager: "#bean:jtaTxManager"
              transacted: "{{transacted}}"
              deliveryPersistent: "{{deliverypersistent}}"
              deliveryDelay: "{{deliverydelay}}"
              timeToLive: "{{timetolive}}"
